name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            tags: webkit2_41
            artifact: accidia-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            tags: ''
            artifact: accidia-macos-universal
          - os: windows-latest
            platform: windows/amd64
            tags: ''
            extra: -nsis
            artifact: accidia-windows-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        run: |
          wails build -platform ${{ matrix.platform }} ${{ matrix.extra }} ${{ matrix.tags && format('-tags {0}', matrix.tags) || '' }}
        shell: bash

      - name: Package macOS as DMG
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          hdiutil create -volname "Accidia" -srcfolder "Accidia.app" -ov -format UDZO ../../accidia.dmg
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/bin/*
            *.dmg
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
